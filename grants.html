<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--navy:#0a1f44;--navy2:#0d2857;--gold:#c9a84c;--gold2:#e8c96a;--off:#f8f9fc;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--green:#16a34a;}
html{overflow-x:hidden;}
body{font-family:'Inter',sans-serif;color:var(--text);background:#fff;overflow-x:hidden;font-size:16px;max-width:100vw;}
nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,0.98);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 16px;justify-content:space-between;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:var(--gold);}
.nav-name{font-size:14px;font-weight:800;color:var(--navy);}
.page-header{padding:28px 16px 20px;background:linear-gradient(135deg,var(--navy),var(--navy2));}
.page-header h1{font-size:clamp(22px,5vw,32px);font-weight:900;color:#fff;margin-bottom:6px;}
.page-header p{font-size:14px;color:rgba(255,255,255,0.7);}
.badges-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.badge-pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-green{background:#dcfce7;color:#166534;}
.badge-white{background:rgba(255,255,255,0.15);color:#fff;}
.filters{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:60px;z-index:100;}
.filter-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{padding:8px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;background:#fff;color:var(--text);font-family:'Inter',sans-serif;transition:all .2s;}
.filter-chip.active,.filter-chip:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.search-wrap{padding:10px 16px 0;}
.search-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;outline:none;}
.search-input:focus{border-color:var(--navy);}
.results-count{padding:12px 16px 4px;font-size:13px;font-weight:600;color:var(--muted);}
main{padding:8px 16px 60px;}
.grants-list{display:flex;flex-direction:column;gap:12px;}
.grant-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px;transition:all .25s;}
.grant-card:hover{box-shadow:0 6px 18px rgba(0,0,0,0.07);border-color:var(--gold);}
.gc-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:6px;}
.gc-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);background:rgba(201,168,76,0.1);padding:3px 8px;border-radius:12px;}
.badge-on{background:#dcfce7;color:#166534;font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;}
.badge-off{background:#fee2e2;color:#991b1b;font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;}
.badge-instant{background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;}
.gc-name{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:6px;line-height:1.3;}
.gc-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px;}
.gc-amt{font-size:20px;font-weight:900;color:var(--navy);}
.gc-dl{font-size:11px;color:var(--muted);margin-bottom:10px;}
.gc-apply{display:block;width:100%;padding:11px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:8px;text-align:center;font-size:13px;font-weight:700;text-decoration:none;transition:all .2s;font-family:'Inter',sans-serif;border:none;cursor:pointer;}
.gc-apply.off{background:#d1d5db;color:#9ca3af;pointer-events:none;}
.no-results{text-align:center;padding:60px 20px;color:var(--muted);}
footer{background:var(--navy);padding:24px 16px;text-align:center;}
footer p{color:rgba(255,255,255,0.4);font-size:13px;}

// Load any admin-added grants
function getAllGrants(){
  const adminGrants = JSON.parse(localStorage.getItem('pgaAdminGrants') || '[]');
  return [...BASE_GRANTS, ...adminGrants];
}

let currentCat = '';
let currentSearch = '';

function setFilter(cat){
  currentCat = cat;
  document.querySelectorAll('.filter-chip').forEach(c=>{
    c.classList.toggle('active', c.textContent.trim() === (cat||'All'));
  });
  renderGrants();
}

function doSearch(val){
  currentSearch = val.toLowerCase();
  renderGrants();
}

function renderGrants(){
  const all = getAllGrants();
  let filtered = all.filter(g=>{
    const matchCat = !currentCat || g.cat === currentCat;
    const matchSearch = !currentSearch || g.name.toLowerCase().includes(currentSearch) || g.desc.toLowerCase().includes(currentSearch);
    return matchCat && matchSearch;
  });

  const list = document.getElementById('grantsList');
  const noRes = document.getElementById('noResults');
  document.getElementById('resCount').textContent = `Showing ${filtered.length} grant${filtered.length!==1?'s':''}`;

  if(!filtered.length){
    list.innerHTML=''; noRes.style.display='block'; return;
  }
  noRes.style.display='none';
  list.innerHTML = filtered.map(g=>`
    <div class="grant-card">
      <div class="gc-row1">
        <span class="gc-cat">${g.cat}</span>
        <span class="${g.active?(g.instant?'badge-instant':'badge-on'):'badge-off'}">${g.active?(g.instant?'⚡ Instant':'✅ Active'):'❌ Closed'}</span>
      </div>
      <div class="gc-name">${g.name}</div>
      <div class="gc-desc">${g.desc}</div>
      <div class="gc-amt">${g.amount}</div>
      <div class="gc-dl">📅 ${g.deadline}</div>
      <a href="apply.html?gid=${g.id}&gname=${encodeURIComponent(g.name)}&gamt=${encodeURIComponent(g.amount)}" class="gc-apply ${g.active?'':'off'}">${g.active?'Apply Now →':'Closed'}</a>
    </div>
  `).join('');
}

window.addEventListener('load',()=>{
  const params = new URLSearchParams(window.location.search);
  const cat = params.get('cat');
  if(cat) setFilter(cat);
  else renderGrants();
});
</script>
